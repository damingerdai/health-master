info:
  contact: {}
  description: health master open api
  termsOfService: http://swagger.io/terms/
  title: health master api
  version: "1.0"
paths:
  /api/v1/height:
    post:
      consumes:
      - application/json
      description: create a new record for user height
      parameters:
      - description: create a user height record
        in: body
        name: user_height
        required: true
        schema:
          $ref: '#/definitions/model.UserHeight'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/model.UserHeightVO'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: create a user height record
      tags:
      - user_height
  /api/v1/password-resets:
    post:
      consumes:
      - application/json
      description: send a password reset link to the user's email
      parameters:
      - description: email address
        in: body
        name: RequestResetInput
        required: true
        schema:
          $ref: '#/definitions/model.RequestResetInput'
      produces:
      - application/json
      responses:
        "200":
          description: password reset link sent
          schema:
            $ref: '#/definitions/errcode.Error'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: create a password reset request
      tags:
      - password-reset
  /api/v1/password-resets/{token}:
    get:
      consumes:
      - application/json
      description: verify the validity of a password reset token
      parameters:
      - description: password reset token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: masked email
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: verify password reset token
      tags:
      - password-reset
    put:
      consumes:
      - application/json
      description: reset user password with a valid password reset token
      parameters:
      - description: password reset token
        in: path
        name: token
        required: true
        type: string
      - description: new password and confirmation
        in: body
        name: ResetPasswordSubmitInput
        required: true
        schema:
          $ref: '#/definitions/model.ResetPasswordSubmitInput'
      produces:
      - application/json
      responses:
        "200":
          description: password reset successfully
          schema:
            $ref: '#/definitions/errcode.Error'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: reset password
      tags:
      - password-reset
  /api/v1/roles:
    get:
      consumes:
      - application/json
      description: get all roles
      produces:
      - application/json
      responses:
        "200":
          description: sucess
          schema:
            items:
              $ref: '#/definitions/model.Role'
            type: array
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: get all roles
      tags:
      - roles
  /api/v1/tmptoken:
    post:
      consumes:
      - application/json
      description: get a temporary token (1 minute expiry)
      parameters:
      - description: access token
        in: query
        name: accessToken
        type: string
      - default: Bearer <Add access token here>
        description: Authorization token
        in: header
        name: Authorization
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/model.UserToken'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: get tmp token
      tags:
      - token
  /api/v1/token:
    get:
      consumes:
      - application/json
      description: parse a exsited token
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: sucess
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: parse a token
      tags:
      - token
    post:
      consumes:
      - application/json
      description: create a new token
      parameters:
      - description: username
        in: header
        name: username
        required: true
        type: string
      - description: password
        in: header
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/model.UserToken'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      summary: create a token
      tags:
      - token
  /api/v1/user:
    post:
      consumes:
      - application/json
      description: create a new user
      parameters:
      - description: create a user
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/model.User'
      produces:
      - application/json
      responses:
        "200":
          description: sucess
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: create a user
      tags:
      - user
  /api/v1/user-temperature:
    post:
      consumes:
      - application/json
      description: create a new record for user temperature
      parameters:
      - description: create a user temperature record
        in: body
        name: user_temperature
        required: true
        schema:
          $ref: '#/definitions/model.UserTemperature'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/model.UserTemperature'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: create a user temperature record
      tags:
      - user_temperature
  /api/v1/user-temperature/{id}:
    get:
      consumes:
      - application/json
      description: get a user temperature record by id
      parameters:
      - description: user temperature id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/model.UserTemperature'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: get a user temperature record
      tags:
      - user_temperature
  /api/v1/user-temperatures:
    get:
      consumes:
      - application/json
      description: list all user temperature records for a user
      parameters:
      - description: user id
        in: query
        name: userId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            items:
              $ref: '#/definitions/model.UserTemperature'
            type: array
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: list all user temperature records
      tags:
      - user_temperature
  /api/v1/user/:
    get:
      consumes:
      - application/json
      description: get user by user id
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: sucess
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: get currentuser
      tags:
      - user
  /api/v1/user/{id}:
    get:
      consumes:
      - application/json
      description: get user by user id
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: sucess
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: bad request error
          schema:
            $ref: '#/definitions/errcode.Error'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/errcode.Error'
      security:
      - BearerAuth: []
      summary: get user
      tags:
      - user
  /api/v1/user_blood_pressure:
    post:
      consumes:
      - application/json
      description: create a user blood pressure
      parameters:
      - description: create a user blood pressure
        in: body
        name: user_blood_pressure
        required: true
        schema:
          $ref: '#/definitions/model.UserBloodPressure'
      produces:
      - application/json
      responses:
        "200":
