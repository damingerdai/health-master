  /api/v1/user_blood_pressures:
    post:
      consumes:
      - application/json
      description: list all user blood pressure for single user
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: page
        in: query
        name: page
        type: string
      - description: limit
